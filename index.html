<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>prodbyk1wz | Official Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: radial-gradient(circle at top, #140824 0%, #05020a 100%); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px; 
            user-select: none; 
        }

        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
        }
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        .profile-img { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.15);
            object-fit: cover;
            position: relative;
            z-index: 2;
        }
        .profile-glow {
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            border-radius: 50%;
            filter: blur(12px);
            opacity: 0.8;
            z-index: 1;
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }
        @keyframes pulseGlow {
            0% { transform: scale(0.96); opacity: 0.6; }
            100% { transform: scale(1.04); opacity: 0.9; }
        }
        
        .ascii-container {
            display: inline-block;
            margin: 15px auto 25px auto;
            touch-action: manipulation; 
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .ascii-art {
            font-family: "Courier New", Courier, monospace;
            font-size: 11px;
            line-height: 1.2;
            color: #ff007f;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            white-space: pre;
            text-align: left;
            letter-spacing: 0px;
            max-width: 100%;
            overflow-x: auto;
            transition: border-color 0.2s;
        }
        
        .ascii-container:hover .ascii-art {
            border-color: rgba(255, 0, 127, 0.3);
        }

        .jumping {
            animation: clickJump 0.4s ease-out;
        }

        @keyframes clickJump {
            0% { transform: translateY(0) scaleY(1); }
            30% { transform: translateY(-35px) scaleY(1.05); } 
            70% { transform: translateY(0) scaleY(0.95); }    
            100% { transform: translateY(0) scaleY(1); }
        }

        h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
        .subtitle { color: #8a8a93; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        /* Spotify Embed Player Container */
        .spotify-embed-container {
            margin: 25px 0 15px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            line-height: 0;
        }

        .link-card { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03); 
            color: #fff; 
            text-decoration: none; 
            padding: 16px 20px; 
            margin: 14px 0; 
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .link-card:hover { 
            background: rgba(255, 255, 255, 0.07); 
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px); 
        }
        .card-left { display: flex; align-items: center; text-align: left; }
        
        .card-icon { 
            margin-right: 16px; 
            width: 24px; 
            height: 24px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-icon svg { width: 100%; height: 100%; }
        
        /* Brand Icon Hex Colors */
        .tiktok-icon { fill: #00f2fe; filter: drop-shadow(2px 0px 0px #fe0979); }
        .insta-icon { fill: url(#insta-gradient); }
        .spotify-icon { fill: #1DB954; }
        .yt-icon { fill: #FF0000; }
        .vinyl-icon { fill: #a855f7; }
        .email-icon { fill: #ff007f; }

        .card-title { font-size: 15px; font-weight: 600; margin-bottom: 1px; }
        .card-sub { color: #66666e; font-size: 13px; }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #d4d4d8;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }
        .link-card:hover .action-btn {
            background: #fff;
            color: #05020a;
            border-color: #fff;
        }
    </style>
